<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>옥수수 좀비 피하기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="score-board">버틴 시간: <span id="score">0</span>초</div>
        <div id="game-board">
            <div id="player">👨‍🌾</div>
        </div>
        <div id="game-over" class="hidden">
            <h1>Game Over!</h1>
            <p>최종 버틴 시간: <span id="final-score">0</span>초</p>
            <button onclick="location.reload()">다시 시작</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
